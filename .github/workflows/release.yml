name: Release

# Triggers on version tags pushed to main (e.g. v1.2.3)
# Required secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ─── Build + push Docker image to Docker Hub ──────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: backend/
          push: true
          tags: |
            tapcard/backend:${{ github.ref_name }}
            tapcard/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Build Expo web PWA → dist-<version>.zip ──────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend/
        run: npm ci

      - name: Export web build
        working-directory: frontend/
        run: npx expo export --platform web

      - name: Zip dist
        env:
          VERSION: ${{ github.ref_name }}
        run: zip -r "dist-${VERSION}.zip" frontend/dist/

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist-${{ github.ref_name }}.zip
          retention-days: 7

  # ─── Create GitHub release with all assets ────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.ref_name }}

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          gh release create "${VERSION}" \
            --title "TapCard ${VERSION}" \
            --generate-notes \
            "dist-${VERSION}.zip#Frontend dist (${VERSION})" \
            "installer/setup.sh#Setup wizard" \
            "installer/update.sh#Update script"
