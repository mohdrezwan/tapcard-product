<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <meta name="theme-color" content="#B09050" id="theme-color-meta" />
  <title>Save Contact — TapCard</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0A0A0A;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 380px;
      width: 100%;
      background: rgba(10, 10, 20, 0.40);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 16px;
      padding: 32px 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .avatar-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
    .avatar-img {
      width: 88px; height: 88px; border-radius: 50%; object-fit: cover;
      border: 3px solid rgba(255,255,255,0.35); box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    .avatar-initials {
      width: 88px; height: 88px; border-radius: 50%; background: #888;
      border: 3px solid rgba(255,255,255,0.35); box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; font-weight: 700; color: #fff;
    }
    .divider { height: 1px; background: rgba(176, 144, 80, 0.25); margin: 0 0 24px 0; }
    .name { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 4px; line-height: 1.2; }
    .title { font-size: 18px; color: #fff; letter-spacing: 0.5px; margin-bottom: 2px; }
    .dept { font-size: 12px; color: #BBBBBB; margin-bottom: 20px; }
    .field { margin-bottom: 14px; }
    .field-label { font-size: 14px; color: #fff; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 3px; }
    .field-value { font-size: 14px; color: #fff; word-break: break-all; }
    .company { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 16px; }
    button {
      display: block; width: 100%; padding: 16px; background: #888; color: #fff;
      border: none; border-radius: 12px; font-size: 16px; font-weight: 600;
      margin-top: 24px; cursor: pointer; font-family: inherit; letter-spacing: 0.3px;
    }
    button:active { opacity: 0.8; }
    .err { color: #ff6b6b; text-align: center; padding: 24px 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar-wrap" id="avatar"></div>
    <div class="divider"></div>
    <div id="content"></div>
  </div>
  <script>
    (function () {
      var API = '';
      var content = document.getElementById('content');

      // Populated from /api/config before contact fetch
      var _themeMap = {};

      function applyTheme(themeId) {
        var td = _themeMap[themeId] || { bg: '#0A0A0A', bgImage: '', accent: '#888888', company: '' };
        document.body.style.background = td.bgImage
          ? td.bg + " url('" + td.bgImage + "') center center / cover no-repeat fixed"
          : td.bg;
        document.getElementById('theme-color-meta').setAttribute('content', td.accent);
        var s = document.createElement('style');
        s.textContent = '.avatar-initials{background:' + td.accent + '}button{background:' + td.accent + '}';
        document.head.appendChild(s);
        return td;
      }

      function el(tag, cls, text) {
        var e = document.createElement(tag);
        if (cls) e.className = cls;
        if (text !== undefined) e.textContent = text;
        return e;
      }

      function sanitizeVCardField(v) {
        return String(v || '').replace(/[\r\n]+/g, ' ').replace(/,/g, '\\,').replace(/;/g, '\\;');
      }

      function buildVCard(p, company) {
        var lines = [
          'BEGIN:VCARD',
          'VERSION:3.0',
          'FN:' + sanitizeVCardField(p.name),
          'N:' + sanitizeVCardField(p.name) + ';;;;',
          'TITLE:' + sanitizeVCardField(p.title),
          'ORG:' + sanitizeVCardField(company || '') + (p.dept ? ';' + sanitizeVCardField(p.dept) : ''),
          'EMAIL:' + sanitizeVCardField(p.email),
        ];
        if (p.phone) lines.push('TEL;TYPE=CELL:' + sanitizeVCardField(p.phone));
        lines.push('END:VCARD');
        return lines.join('\n');
      }

      function renderContact(p, td) {
        while (content.firstChild) content.removeChild(content.firstChild);
        if (p.name)     content.appendChild(el('div', 'name', p.name));
        if (p.title)    content.appendChild(el('div', 'title', p.title));
        if (p.dept)     content.appendChild(el('div', 'dept', p.dept));
        if (td.company) content.appendChild(el('div', 'company', td.company));
        if (p.phone) {
          var pf = el('div', 'field');
          pf.appendChild(el('div', 'field-label', 'Phone'));
          pf.appendChild(el('div', 'field-value', p.phone));
          content.appendChild(pf);
        }
        if (p.email) {
          var ef = el('div', 'field');
          ef.appendChild(el('div', 'field-label', 'Email'));
          ef.appendChild(el('div', 'field-value', p.email));
          content.appendChild(ef);
        }
        var btn = el('button', '', 'Save to Contacts');
        btn.addEventListener('click', function () {
          var vcard = buildVCard(p, td.company);
          var blob = new Blob([vcard], { type: 'text/vcard' });
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url;
          a.download = (p.name || 'contact').replace(/\s+/g, '_') + '.vcf';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
        });
        content.appendChild(btn);
      }

      function showError(msg) {
        while (content.firstChild) content.removeChild(content.firstChild);
        content.appendChild(el('p', 'err', msg));
      }

      function loadContact() {
        var email = new URLSearchParams(location.search).get('e');
        if (!email) { showError('No contact specified.'); return; }
        email = email.toLowerCase().trim();

        fetch(API + '/vcard/' + encodeURIComponent(email), { cache: 'no-store' })
          .then(function (r) {
            if (!r.ok) throw new Error(r.status === 404 ? 'Contact not found.' : 'Failed to load contact.');
            return r.json();
          })
          .then(function (p) {
            var td = applyTheme(p.theme);
            if (p.name) document.title = 'Save ' + p.name + ' — TapCard';

            var avatarEl = document.getElementById('avatar');
            if (p.photo) {
              var img = document.createElement('img');
              img.className = 'avatar-img';
              img.alt = p.name || '';
              var photoVer = p.photo.indexOf('?v=') !== -1 ? '?v=' + p.photo.split('?v=')[1] : '';
              img.src = API + '/vcard/' + encodeURIComponent(email) + '/photo' + photoVer;
              img.onerror = function () {
                avatarEl.removeChild(img);
                var initDiv = el('div', 'avatar-initials', (p.name || '?').charAt(0).toUpperCase());
                avatarEl.appendChild(initDiv);
              };
              avatarEl.appendChild(img);
            } else {
              avatarEl.appendChild(el('div', 'avatar-initials', (p.name || '?').charAt(0).toUpperCase()));
            }

            renderContact(p, td);
          })
          .catch(function (e) { showError(e.message || 'Unable to load contact.'); });
      }

      // Fetch config first to build theme map, then load contact
      fetch('/api/config', { cache: 'no-store' })
        .then(function (r) { return r.json(); })
        .then(function (cfg) {
          (cfg.themes || []).forEach(function (t) {
            _themeMap[t.id] = {
              bg:      t.landingBg || '#0A0A0A',
              bgImage: t.bgImage   || '',
              accent:  t.accent    || '#888888',
              company: (t.subsidiary && t.subsidiary.companyName) || t.name || '',
            };
          });
        })
        .catch(function () {})
        .then(loadContact);
    })();
  </script>
</body>
</html>
